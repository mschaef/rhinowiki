# rhinowiki — nginx security headers
# Include this file inside the server {} block that proxies to rhinowiki:
#
#   server {
#       ...
#       include /etc/nginx/snippets/rhinowiki-security-headers.conf;
#       ...
#   }

# ---------------------------------------------------------------------------
# Content-Security-Policy
#
# Highlight.js runs server-side (GraalVM), so the browser receives pre-rendered
# HTML with:
#   - no inline scripts
#   - no external script sources
#   - CSS and fonts served from self
#   - images may be external (embedded in blog posts)
#
# If you ever add inline <style> or <script> blocks, remove the 'none'/'self'
# restriction for that directive and add a nonce or hash instead.
# ---------------------------------------------------------------------------
add_header Content-Security-Policy
    "default-src 'self'; \
     script-src 'none'; \
     style-src 'self'; \
     font-src 'self'; \
     img-src 'self' data: https:; \
     frame-ancestors 'none'; \
     base-uri 'self'; \
     form-action 'self'"
    always;

# ---------------------------------------------------------------------------
# Strict-Transport-Security
#
# Tells browsers to always use HTTPS for this domain.  The one-year max-age
# is the recommended minimum.  Add 'preload' and submit to
# hstspreload.org once you are confident all sub-domains are on HTTPS.
# ---------------------------------------------------------------------------
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# ---------------------------------------------------------------------------
# X-Content-Type-Options
#
# Prevents browsers from MIME-sniffing a response away from the declared
# Content-Type.  No configuration needed.
# ---------------------------------------------------------------------------
add_header X-Content-Type-Options "nosniff" always;

# ---------------------------------------------------------------------------
# X-Frame-Options
#
# Blocks the site from being embedded in an <iframe>, preventing clickjacking.
# Superseded by CSP frame-ancestors above, but kept for older browsers.
# ---------------------------------------------------------------------------
add_header X-Frame-Options "DENY" always;

# ---------------------------------------------------------------------------
# Referrer-Policy
#
# Sends the full URL only on same-origin navigations; sends only the origin
# on cross-origin requests; sends nothing on downgrades (HTTPS → HTTP).
# Prevents leaking slug/path information to third-party sites.
# ---------------------------------------------------------------------------
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# ---------------------------------------------------------------------------
# Permissions-Policy
#
# Disables browser features that a read-only blog has no use for.
# ---------------------------------------------------------------------------
add_header Permissions-Policy
    "camera=(), \
     microphone=(), \
     geolocation=(), \
     payment=(), \
     usb=(), \
     interest-cohort=()"
    always;
